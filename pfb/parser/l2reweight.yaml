inputs:
  output_filename:
    required: True
    abbreviation: o
    info:
      Basename of output
  nband:
    dtype: int
    required: true
    abbreviation: nb
    info:
      Number of imaging bands
  product:
    dtype: str
    abbreviation: p
    default: I
    info:
      Imaging products to produce. Options are I, Q, U, V.
      Only single Stokes products are currently supported
  postfix:
    dtype: str
    default: ''
    info:
      Can be used to specify a custom name for the image space data products

  _include:
    - (pfb.parser)dist.yml
    - (pfb.parser)gridding.yml

outputs:
    {}
